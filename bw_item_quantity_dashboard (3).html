<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CY's Branwood — Item Quantity Dashboard</title>
<style>
:root{--bg:#fff;--text:#1a1a2e;--accent:#e07a28;--accent2:#2563eb;--border:#e2e4e9;--hover:#f7f8fa;--card:#fff;--muted:#6b7280;--green:#16a34a;--red:#dc2626;--tab-bg:#f1f3f5}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.header{padding:18px 24px;border-bottom:2px solid var(--accent);display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:700}
.header h1 span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--muted)}
.container{display:flex;height:calc(100vh - 62px)}
.filters-panel{width:220px;min-width:220px;border-right:1px solid var(--border);padding:12px;overflow-y:auto;background:#fafbfc}
.filter-group{margin-bottom:14px}
.filter-group label{display:block;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.filter-list{max-height:140px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;background:#fff}
.filter-item{padding:3px 8px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px}
.filter-item:hover{background:var(--hover)}
.filter-item input[type="checkbox"]{margin:0}
.filter-actions{display:flex;gap:6px;margin-top:3px}
.filter-actions button{font-size:10px;color:var(--accent2);background:none;border:none;cursor:pointer;text-decoration:underline}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--tab-bg);padding:0 16px}
.tab{padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:#fff;font-weight:600}
.summary-bar{display:flex;gap:12px;padding:14px 20px;flex-wrap:wrap}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;min-width:150px;flex:1}
.summary-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.summary-card .value{font-size:22px;font-weight:700;margin-top:2px}
.table-wrap{flex:1;overflow:auto;padding:0 20px 20px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{position:sticky;top:0;background:#f8f9fa;text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);font-weight:600;font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap;z-index:2}
thead th:hover{color:var(--text)}
thead th.sort-asc::after{content:' ▲';font-size:9px}
thead th.sort-desc::after{content:' ▼';font-size:9px}
tbody td{padding:6px 10px;border-bottom:1px solid var(--border)}
tbody tr:hover{background:var(--hover)}
.num{text-align:right;font-variant-numeric:tabular-nums}
.rank{display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;border-radius:50%;font-size:11px;font-weight:700}
.rank-1{background:#ffd700;color:#000}.rank-2{background:#c0c0c0;color:#000}.rank-3{background:#cd7f32;color:#fff}
.bar-cell{display:flex;align-items:center;gap:6px}
.bar{height:14px;border-radius:3px;background:var(--accent);opacity:.7;min-width:2px}
#statusLine{padding:6px 20px;font-size:11px;color:var(--muted);border-top:1px solid var(--border)}
.search-box{padding:8px 20px}
.search-box input{width:100%;padding:7px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none}
.search-box input:focus{border-color:var(--accent)}
/* PIVOT TABLE */
.pivot-wrap{flex:1;overflow:auto;padding:0 20px 20px}
.pivot-wrap table{font-size:12px}
.pivot-wrap thead th{font-size:11px;padding:6px 8px;text-align:center;min-width:70px}
.pivot-wrap thead th:first-child{text-align:left;min-width:200px;position:sticky;left:0;z-index:3;background:#f8f9fa}
.pivot-wrap tbody td{text-align:center;padding:5px 8px;font-variant-numeric:tabular-nums}
.pivot-wrap tbody td:first-child{text-align:left;font-weight:500;position:sticky;left:0;background:#fff;z-index:1}
.pivot-wrap tbody tr:hover td:first-child{background:var(--hover)}
.pivot-wrap tbody td.total-col{font-weight:700;background:#fef9f0}
.pivot-wrap thead th.total-col{background:#fef3e2}
.pivot-wrap .heat-0{color:#ccc}.pivot-wrap .heat-1{color:#888}.pivot-wrap .heat-2{color:var(--text)}.pivot-wrap .heat-3{color:var(--accent);font-weight:600}.pivot-wrap .heat-4{color:var(--green);font-weight:700}
.pivot-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px 20px}
.pivot-controls select,.pivot-controls input{padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px}
.pivot-controls label{font-size:12px;color:var(--muted);font-weight:500}
</style>
</head>

let allRows=[], currentTab='overview', sortCol=null, sortDir='desc';
let filters={fc:[],team:[],brand:[],ol:[],month:[],cat:[]};
let filterOptions={}, searchTerm='', pivotSearch='', pivotSortCol=null, pivotSortDir='desc';

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(n){return n.toLocaleString()}
function fmtMoney(n){return'$'+n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
const MO={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
function sortMonths(arr){return arr.sort((a,b)=>{const[ma,ya]=a.split('-');const[mb,yb]=b.split('-');return(parseInt(ya)-parseInt(yb))||(MO[ma]-MO[mb])})}

function init(){
  const today=new Date();
  allRows=[];
  for(const r of RAW_DATA){
    const dateStr=r[3]||'';let month='';
    if(dateStr){const p=dateStr.split('-');if(p.length===3){month=p[1]+'-'+p[2];const d=new Date(2000+parseInt(p[2]),(MO[p[1]]-1)||0,parseInt(p[0]));if(d>today)continue}}
    allRows.push({fc:r[0],team:r[1],brand:r[2],date:dateStr,month,ol:r[4],item:r[5],qty:r[6],up:r[7],amt:r[8],csdCode:r[9],mainCode:r[10],engName:r[11],chiName:r[12],cat:r[13]});
  }
  document.getElementById('statusLine').textContent=allRows.length.toLocaleString()+' rows · Offline snapshot';
  buildFilters();renderTab();
}

function buildFilters(){
  filterOptions={
    month:sortMonths([...new Set(allRows.map(r=>r.month))].filter(Boolean)),
    fc:[...new Set(allRows.map(r=>r.fc))].filter(Boolean).sort(),
    team:[...new Set(allRows.map(r=>r.team))].filter(Boolean).sort(),
    brand:[...new Set(allRows.map(r=>r.brand))].filter(Boolean).sort(),
    ol:[...new Set(allRows.map(r=>r.ol))].filter(Boolean).sort(),
    cat:[...new Set(allRows.map(r=>r.cat))].filter(Boolean).sort()
  };
  for(const k of Object.keys(filters))filters[k]=[];
  const labels={month:'Month',fc:'Food Court',team:'Manager',brand:'Brand',ol:'Outlet',cat:'Category'};
  const c=document.getElementById('filterContainers');c.innerHTML='';
  for(const[key,opts] of Object.entries(filterOptions)){
    const d=document.createElement('div');d.className='filter-group';
    d.innerHTML='<label>'+labels[key]+' ('+opts.length+')</label><div class="filter-actions"><button onclick="selectAll(\''+key+'\')">All</button><button onclick="clearFilter(\''+key+'\')">None</button></div><div class="filter-list" id="fl_'+key+'">'+opts.map(o=>'<div class="filter-item" onclick="toggleFilter(\''+key+'\',\''+o.replace(/'/g,"\\'")+'\')">'+'<input type="checkbox" checked> '+escHtml(o)+'</div>').join('')+'</div>';
    c.appendChild(d);filters[key]=[...opts];
  }
}
function toggleFilter(key,val){const idx=filters[key].indexOf(val);if(idx>=0)filters[key].splice(idx,1);else filters[key].push(val);const list=document.getElementById('fl_'+key);if(list){list.querySelectorAll('.filter-item').forEach(el=>{const txt=el.textContent.trim();const cb=el.querySelector('input');if(txt===val)cb.checked=idx<0})}renderTab()}
function selectAll(key){filters[key]=[...filterOptions[key]];document.querySelectorAll('#fl_'+key+' input').forEach(cb=>cb.checked=true);renderTab()}
function clearFilter(key){filters[key]=[];document.querySelectorAll('#fl_'+key+' input').forEach(cb=>cb.checked=false);renderTab()}
function getFilteredRows(){return allRows.filter(r=>{if(filters.fc.length&&!filters.fc.includes(r.fc))return false;if(filters.team.length&&!filters.team.includes(r.team))return false;if(filters.brand.length&&!filters.brand.includes(r.brand))return false;if(filters.ol.length&&!filters.ol.includes(r.ol))return false;if(filters.month.length&&!filters.month.includes(r.month))return false;if(filters.cat.length&&!filters.cat.includes(r.cat))return false;return true})}

const TABS=[{id:'overview',label:'Overview'},{id:'byItem',label:'By Item'},{id:'byOutlet',label:'By Outlet'},{id:'byBrand',label:'By Brand'},{id:'byCat',label:'By Category'},{id:'byMonth',label:'Monthly Trend'},{id:'pivot',label:'📊 Qty by Month'}];
function renderTabBar(){document.getElementById('tabBar').innerHTML=TABS.map(t=>'<div class="tab'+(t.id===currentTab?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</div>').join('')}
function switchTab(id){currentTab=id;sortCol=null;sortDir='desc';searchTerm='';if(id!=='pivot'){pivotSearch='';pivotSortCol=null;pivotSortDir='desc'}renderTab()}
function renderTab(){renderTabBar();const rows=getFilteredRows();const area=document.getElementById('mainArea');switch(currentTab){case'overview':renderOverview(rows,area);break;case'byItem':renderByItem(rows,area);break;case'byOutlet':renderByOutlet(rows,area);break;case'byBrand':renderByBrand(rows,area);break;case'byCat':renderByCategory(rows,area);break;case'byMonth':renderByMonth(rows,area);break;case'pivot':renderPivot(rows,area);break}}

function aggregate(rows,keyFn){const map={};rows.forEach(r=>{const k=keyFn(r);if(!map[k])map[k]={key:k,qty:0,amt:0,count:0};map[k].qty+=r.qty;map[k].amt+=r.amt;map[k].count++});return Object.values(map)}
function rankBadge(i){if(i===0)return'<span class="rank rank-1">1</span>';if(i===1)return'<span class="rank rank-2">2</span>';if(i===2)return'<span class="rank rank-3">3</span>';return'<span style="font-size:12px;color:var(--muted)">'+(i+1)+'</span>'}
function sortData(arr,col,dir){arr.sort((a,b)=>{let va=a[col],vb=b[col];if(typeof va==='string'){va=va.toLowerCase();vb=(vb||'').toLowerCase()}return va<vb?(dir==='asc'?-1:1):va>vb?(dir==='asc'?1:-1):0})}

// ===== PIVOT TABLE: Items x Months =====
function renderPivot(rows,area){
  const months=sortMonths([...new Set(rows.map(r=>r.month))].filter(Boolean));
  // Build pivot: item -> { month -> qty }
  const pivot={};
  rows.forEach(r=>{
    const item=r.engName||r.item;
    if(!item)return;
    if(!pivot[item])pivot[item]={name:item,cat:'',chiName:'',total:0,months:{}};
    pivot[item].months[r.month]=(pivot[item].months[r.month]||0)+r.qty;
    pivot[item].total+=r.qty;
    if(!pivot[item].cat){pivot[item].cat=r.cat;pivot[item].chiName=r.chiName}
  });
  let items=Object.values(pivot);

  // Filter by search
  if(pivotSearch){
    const s=pivotSearch.toLowerCase();
    items=items.filter(x=>x.name.toLowerCase().includes(s)||(x.chiName||'').includes(pivotSearch)||(x.cat||'').toLowerCase().includes(s));
  }

  // Sort
  if(pivotSortCol==='name')items.sort((a,b)=>pivotSortDir==='asc'?a.name.localeCompare(b.name):b.name.localeCompare(a.name));
  else if(pivotSortCol==='total')items.sort((a,b)=>pivotSortDir==='asc'?a.total-b.total:b.total-a.total);
  else if(pivotSortCol==='cat')items.sort((a,b)=>pivotSortDir==='asc'?(a.cat||'').localeCompare(b.cat||''):(b.cat||'').localeCompare(a.cat||''));
  else if(pivotSortCol&&pivotSortCol.startsWith('m_')){
    const m=pivotSortCol.slice(2);
    items.sort((a,b)=>pivotSortDir==='asc'?(a.months[m]||0)-(b.months[m]||0):(b.months[m]||0)-(a.months[m]||0));
  } else items.sort((a,b)=>b.total-a.total);

  // Find max for heat coloring
  const maxVal=Math.max(...items.flatMap(x=>months.map(m=>x.months[m]||0)),1);

  function heatClass(v){
    if(!v)return'heat-0';
    const pct=v/maxVal;
    if(pct>=0.6)return'heat-4';
    if(pct>=0.3)return'heat-3';
    if(pct>=0.1)return'heat-2';
    return'heat-1';
  }

  // Column totals
  const colTotals={};
  months.forEach(m=>{colTotals[m]=items.reduce((s,x)=>s+(x.months[m]||0),0)});
  const grandTotal=items.reduce((s,x)=>s+x.total,0);

  function sortIcon(col){if(pivotSortCol===col)return pivotSortDir==='asc'?' ▲':' ▼';return''}

  area.innerHTML='<div class="pivot-controls">'+
    '<label>Search:</label><input type="text" placeholder="Search items…" value="'+escHtml(pivotSearch)+'" oninput="pivotSearch=this.value;renderTab()" style="min-width:200px">'+
    '<label style="margin-left:12px">'+items.length+' items × '+months.length+' months</label></div>'+
    '<div class="pivot-wrap"><table id="pivotTbl"><thead><tr>'+
    '<th onclick="pivotSort(\'name\')">Item'+sortIcon('name')+'</th>'+
    '<th onclick="pivotSort(\'cat\')" style="min-width:100px">Category'+sortIcon('cat')+'</th>'+
    months.map(m=>'<th onclick="pivotSort(\'m_'+m+'\')">'+m+sortIcon('m_'+m)+'</th>').join('')+
    '<th class="total-col" onclick="pivotSort(\'total\')">Total'+sortIcon('total')+'</th>'+
    '</tr></thead><tbody>'+
    items.map(x=>'<tr><td title="'+escHtml(x.chiName||'')+'">'+escHtml(x.name)+'</td><td style="font-size:11px;color:var(--muted)">'+escHtml(x.cat)+'</td>'+
    months.map(m=>{const v=x.months[m]||0;return'<td class="num '+heatClass(v)+'">'+(v?fmt(v):'-')+'</td>'}).join('')+
    '<td class="num total-col">'+fmt(x.total)+'</td></tr>').join('')+
    '<tr style="font-weight:700;border-top:2px solid var(--border)"><td>TOTAL</td><td></td>'+
    months.map(m=>'<td class="num">'+fmt(colTotals[m]||0)+'</td>').join('')+
    '<td class="num total-col">'+fmt(grandTotal)+'</td></tr>'+
    '</tbody></table></div>';
}

function pivotSort(col){
  if(pivotSortCol===col)pivotSortDir=pivotSortDir==='desc'?'asc':'desc';
  else{pivotSortCol=col;pivotSortDir='desc'}
  renderTab();
}

function renderOverview(rows,area){
  const totalQty=rows.reduce((s,r)=>s+r.qty,0);const totalAmt=rows.reduce((s,r)=>s+r.amt,0);
  const uniqueItems=new Set(rows.map(r=>r.engName||r.item)).size;const uniqueOutlets=new Set(rows.map(r=>r.ol)).size;
  const byItem=aggregate(rows,r=>r.engName||r.item);byItem.sort((a,b)=>b.qty-a.qty);
  const top10=byItem.slice(0,10);const bottom10=byItem.filter(x=>x.key).sort((a,b)=>a.qty-b.qty).slice(0,10);
  const maxQ=top10[0]?.qty||1;const maxQB=bottom10.length?Math.max(...bottom10.map(r=>r.qty),1):1;
  area.innerHTML='<div class="summary-bar">'+
    '<div class="summary-card"><div class="label">Total Qty Sold</div><div class="value">'+fmt(totalQty)+'</div></div>'+
    '<div class="summary-card"><div class="label">Total Revenue</div><div class="value">'+fmtMoney(totalAmt)+'</div></div>'+
    '<div class="summary-card"><div class="label">Unique Items</div><div class="value">'+fmt(uniqueItems)+'</div></div>'+
    '<div class="summary-card"><div class="label">Outlets</div><div class="value">'+fmt(uniqueOutlets)+'</div></div></div>'+
    '<div style="display:flex;gap:20px;padding:0 20px 20px;flex-wrap:wrap;">'+
    '<div style="flex:1;min-width:400px;"><h3 style="font-size:14px;margin-bottom:8px;color:var(--green)">🔥 Top 10 Best Sellers (by Qty)</h3>'+
    '<table><thead><tr><th>#</th><th>Item</th><th>Qty</th><th></th><th class="num">Revenue</th></tr></thead><tbody>'+
    top10.map((r,i)=>'<tr><td>'+rankBadge(i)+'</td><td>'+escHtml(r.key)+'</td><td class="num">'+fmt(r.qty)+'</td><td><div class="bar-cell"><div class="bar" style="width:'+(r.qty/maxQ*150)+'px;background:var(--green)"></div></div></td><td class="num">'+fmtMoney(r.amt)+'</td></tr>').join('')+
    '</tbody></table></div>'+
    '<div style="flex:1;min-width:400px;"><h3 style="font-size:14px;margin-bottom:8px;color:var(--red)">📉 Bottom 10 (by Qty)</h3>'+
    '<table><thead><tr><th>#</th><th>Item</th><th>Qty</th><th></th><th class="num">Revenue</th></tr></thead><tbody>'+
    bottom10.map((r,i)=>'<tr><td style="font-size:12px;color:var(--muted)">'+(i+1)+'</td><td>'+escHtml(r.key)+'</td><td class="num">'+fmt(r.qty)+'</td><td><div class="bar-cell"><div class="bar" style="width:'+(r.qty/maxQB*80)+'px;background:var(--red);opacity:.5"></div></div></td><td class="num">'+fmtMoney(r.amt)+'</td></tr>').join('')+
    '</tbody></table></div></div>';
}

// ===== BY ITEM =====
function renderByItem(rows,area){
  const byItem=aggregate(rows,r=>r.engName||r.item);
  byItem.forEach(x=>{const s=rows.find(r=>(r.engName||r.item)===x.key);x.cat=s?s.cat:'';x.chiName=s?s.chiName:'';x.csdCode=s?s.mainCode:''});
  if(sortCol)sortData(byItem,sortCol,sortDir);else byItem.sort((a,b)=>b.qty-a.qty);
  const maxQ=byItem[0]?.qty||1;
  const filtered=byItem.filter(r=>!searchTerm||r.key.toLowerCase().includes(searchTerm.toLowerCase())||(r.chiName||'').includes(searchTerm)||(r.csdCode||'').toLowerCase().includes(searchTerm.toLowerCase()));
  area.innerHTML='<div class="search-box"><input type="text" placeholder="Search items…" value="'+escHtml(searchTerm)+'" oninput="searchTerm=this.value;renderTab()"></div>'+
    '<div class="table-wrap"><table id="tblItem"><thead><tr><th data-col="key">Item (Eng)</th><th data-col="chiName">中文</th><th data-col="cat">Category</th><th data-col="csdCode">Code</th><th data-col="qty" class="num">Qty</th><th></th><th data-col="amt" class="num">Revenue</th><th data-col="count" class="num">Rows</th></tr></thead><tbody>'+
    filtered.map(r=>'<tr><td>'+escHtml(r.key)+'</td><td>'+escHtml(r.chiName)+'</td><td>'+escHtml(r.cat)+'</td><td style="font-size:11px;color:var(--muted)">'+escHtml(r.csdCode)+'</td><td class="num">'+fmt(r.qty)+'</td><td><div class="bar-cell"><div class="bar" style="width:'+(r.qty/maxQ*120)+'px"></div></div></td><td class="num">'+fmtMoney(r.amt)+'</td><td class="num">'+fmt(r.count)+'</td></tr>').join('')+
    '</tbody></table></div>';
  document.querySelectorAll('#tblItem th[data-col]').forEach(th=>{th.onclick=()=>{const c=th.dataset.col;if(sortCol===c)sortDir=sortDir==='desc'?'asc':'desc';else{sortCol=c;sortDir='desc'}renderTab()}});
  if(sortCol){const th=document.querySelector('#tblItem th[data-col="'+sortCol+'"]');if(th)th.classList.add('sort-'+sortDir)}
}

// ===== BY MONTH =====
function renderByMonth(rows,area){
  const byM=aggregate(rows,r=>r.month);
  byM.sort((a,b)=>{const[ma,ya]=a.key.split('-');const[mb,yb]=b.key.split('-');return(parseInt(ya)-parseInt(yb))||(MO[ma]-MO[mb])});
  byM.forEach(x=>{x.outlets=new Set(rows.filter(r=>r.month===x.key).map(r=>r.ol)).size;x.items=new Set(rows.filter(r=>r.month===x.key).map(r=>r.engName||r.item)).size;x.avgPerOutlet=x.outlets?Math.round(x.qty/x.outlets):0});
  const maxQ=Math.max(...byM.map(r=>r.qty),1);
  const barW=Math.min(80,Math.floor(600/Math.max(byM.length,1)));
  const chartW=byM.length*(barW+10)+40;const chartH=200;
  area.innerHTML='<div style="padding:20px"><h3 style="font-size:14px;margin-bottom:12px">Monthly Quantity Trend</h3><div style="overflow-x:auto;margin-bottom:20px"><svg width="'+chartW+'" height="'+(chartH+60)+'" style="font-family:inherit">'+
    byM.map((r,i)=>{const h=(r.qty/maxQ)*chartH;const x=20+i*(barW+10);return'<g><rect x="'+x+'" y="'+(chartH-h+10)+'" width="'+barW+'" height="'+h+'" fill="#e07a28" rx="3" opacity=".8"/><text x="'+(x+barW/2)+'" y="'+(chartH-h+5)+'" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">'+fmt(r.qty)+'</text><text x="'+(x+barW/2)+'" y="'+(chartH+28)+'" text-anchor="middle" font-size="11" fill="#6b7280">'+r.key+'</text></g>'}).join('')+
    '</svg></div><table id="tblM"><thead><tr><th data-col="key">Month</th><th data-col="outlets" class="num">Outlets</th><th data-col="items" class="num">Items</th><th data-col="qty" class="num">Qty</th><th data-col="amt" class="num">Revenue</th><th data-col="avgPerOutlet" class="num">Avg/Outlet</th></tr></thead><tbody>'+
    byM.map(r=>'<tr><td><strong>'+escHtml(r.key)+'</strong></td><td class="num">'+fmt(r.outlets)+'</td><td class="num">'+fmt(r.items)+'</td><td class="num">'+fmt(r.qty)+'</td><td class="num">'+fmtMoney(r.amt)+'</td><td class="num">'+fmt(r.avgPerOutlet)+'</td></tr>').join('')+
    '</tbody></table></div>';
  document.querySelectorAll('#tblM th[data-col]').forEach(th=>{th.onclick=()=>{const c=th.dataset.col;if(sortCol===c)sortDir=sortDir==='desc'?'asc':'desc';else{sortCol=c;sortDir='desc'}renderTab()}});
  if(sortCol){const th=document.querySelector('#tblM th[data-col="'+sortCol+'"]');if(th)th.classList.add('sort-'+sortDir)}
}
